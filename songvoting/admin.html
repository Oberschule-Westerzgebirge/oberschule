<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎛️ Admin – Song-Voting</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBYubfEPbipWGWrpvMZAoMZN1F98p0jiw4",
      authDomain: "oberschule-moderation.firebaseapp.com",
      projectId: "oberschule-moderation",
      storageBucket: "oberschule-moderation.firebasestorage.app",
      messagingSenderId: "224718576254",
      appId: "1:224718576254:web:54a9aa2e8690f44e44162f"
    });
    const db = firebase.firestore();
  </script>
  <style>
    :root {
      --bg:#0f0e17; --surface:#1a1928; --card:#232236;
      --accent:#f4a261; --gold:#ffd166; --text:#fffffe;
      --muted:#a7a9be; --green:#06d6a0; --red:#ef233c; --radius:14px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; }
    .wrap { max-width:700px; margin:0 auto; padding:28px 24px 60px; display:flex; flex-direction:column; gap:24px; }

    /* HEADER */
    .admin-header { display:flex; align-items:center; gap:12px; }
    .admin-logo { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--accent); }
    .phase-badge { margin-left:auto; padding:5px 14px; border-radius:99px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; background:var(--surface); color:var(--muted); }

    /* SECTION */
    .section { background:var(--card); border-radius:var(--radius); padding:22px; display:flex; flex-direction:column; gap:14px; }
    .section-title { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--accent); }

    /* BUTTONS */
    .btn { padding:13px 20px; border-radius:10px; border:none; font-family:'Bebas Neue',sans-serif; font-size:18px; cursor:pointer; transition:transform .1s,opacity .2s; }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.35; cursor:not-allowed; }
    .btn-accent { background:var(--accent); color:var(--bg); }
    .btn-green { background:var(--green); color:var(--bg); }
    .btn-red { background:var(--red); color:white; }
    .btn-gold { background:var(--gold); color:var(--bg); }
    .btn-surface { background:var(--surface); color:var(--text); }
    .btn-sm { font-size:14px; padding:8px 14px; font-family:'DM Sans',sans-serif; font-weight:600; }

    /* PHASE */
    .phase-row { display:flex; gap:12px; flex-wrap:wrap; align-items:stretch; }
    .phase-indicator { flex:1; min-width:150px; background:var(--surface); border-radius:10px; padding:14px 16px; }
    .phase-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; }
    .phase-value { font-family:'Bebas Neue',sans-serif; font-size:26px; margin-top:4px; }
    .phase-buttons { display:flex; flex-direction:column; gap:8px; }

    /* SONGS */
    input[type="text"] { flex:1; padding:12px 16px; border-radius:10px; border:2px solid var(--surface); background:var(--surface); color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; transition:border-color .2s; }
    input[type="text"]:focus { border-color:var(--accent); }
    input[type="text"]::placeholder { color:var(--muted); }
    .input-row { display:flex; gap:10px; }
    .song-item { background:var(--surface); border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:12px; margin-bottom:6px; }
    .song-item.now-playing { border-left:3px solid var(--accent); }
    .song-info { flex:1; }
    .song-name { font-weight:600; font-size:15px; }
    .song-artist { color:var(--muted); font-size:13px; }
    .playing-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); animation:blink 1s ease-in-out infinite; flex-shrink:0; }
    .spacer-dot { width:10px; flex-shrink:0; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

    /* VOTES */
    .vote-row { background:var(--surface); border-radius:10px; padding:12px 16px; display:flex; align-items:center; gap:12px; margin-bottom:6px; }
    .vote-row.leader { border-left:3px solid var(--gold); }
    .vote-song { flex:1; font-weight:600; }
    .vote-bar-wrap { flex:2; height:8px; background:var(--card); border-radius:99px; overflow:hidden; }
    .vote-bar { height:100%; background:var(--accent); border-radius:99px; transition:width .5s; }
    .vote-row.leader .vote-bar { background:var(--gold); }
    .vote-total { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--accent); min-width:36px; text-align:right; }
    .vote-row.leader .vote-total { color:var(--gold); }

    .voter-count { font-size:13px; color:var(--muted); }
    .empty { color:var(--muted); font-size:14px; text-align:center; padding:20px; }
    .danger-row { display:flex; gap:10px; flex-wrap:wrap; }
    a { color:var(--accent); font-size:13px; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="admin-header">
    <div class="admin-logo">🎛️ Admin – Song Voting</div>
    <a href="index.html" target="_blank">Schüler-Ansicht ↗</a>
    <div class="phase-badge" id="phase-badge">–</div>
  </div>

  <!-- PHASE -->
  <div class="section">
    <div class="section-title">Phase steuern</div>
    <div class="phase-row">
      <div class="phase-indicator">
        <div class="phase-label">Aktuelle Phase</div>
        <div class="phase-value" id="phase-value">–</div>
      </div>
      <div class="phase-buttons">
        <button class="btn btn-accent" onclick="setPhase('listening')">▶ Zuhören starten</button>
        <button class="btn btn-green" onclick="setPhase('voting')">🗳️ Voting öffnen</button>
        <button class="btn btn-gold" onclick="setPhase('results')">🏆 Ergebnis zeigen</button>
        <button class="btn btn-surface" onclick="setPhase('waiting')">↺ Zurücksetzen</button>
      </div>
    </div>
  </div>

  <!-- SONGS VERWALTEN -->
  <div class="section">
    <div class="section-title">Songs verwalten</div>
    <div class="input-row">
      <input type="text" id="input-title" placeholder="Songname *" />
      <input type="text" id="input-artist" placeholder="Interpret" style="max-width:180px" />
    </div>
    <button class="btn btn-accent" onclick="addSong()">+ Song hinzufügen</button>
    <div id="song-list"><div class="empty">Noch keine Songs</div></div>
  </div>

  <!-- JETZT GESPIELT -->
  <div class="section">
    <div class="section-title">▶ Aktuell gespielt</div>
    <p style="color:var(--muted);font-size:14px">Klicke auf einen Song, um ihn live als „jetzt spielend" zu markieren.</p>
    <div id="now-playing-selector"><div class="empty">Keine Songs</div></div>
  </div>

  <!-- LIVE STIMMEN -->
  <div class="section">
    <div class="section-title">📊 Live-Stimmen</div>
    <div class="voter-count" id="voter-count">0 Schüler haben abgestimmt</div>
    <div id="votes-grid"><div class="empty">Noch keine Stimmen</div></div>
  </div>

  <!-- GEFAHRENZONE -->
  <div class="section">
    <div class="section-title" style="color:var(--red)">⚠️ Gefahrenzone</div>
    <div class="danger-row">
      <button class="btn btn-red btn-sm" onclick="clearVotes()">Alle Stimmen löschen</button>
      <button class="btn btn-red btn-sm" onclick="clearAll()">Alles zurücksetzen</button>
    </div>
  </div>

</div>
<script>
  let songs = {}, currentSongId = null, allVotes = {};

  const phaseLabels = {waiting:"⏸ Warten",listening:"▶ Zuhören",voting:"🗳 Abstimmen",results:"🏆 Ergebnis"};

  // ── STATE LISTENER ────────────────────────────────────────────────
  db.collection("voting_session").doc("state").onSnapshot(snap => {
    if (!snap.exists) return;
    const data = snap.data();
    const phase = data.phase || "waiting";
    currentSongId = data.currentSong || null;
    document.getElementById("phase-value").textContent = phaseLabels[phase] || phase;
    document.getElementById("phase-badge").textContent = phaseLabels[phase] || phase;
    renderSongList();
    renderNowPlayingSelector();
  });

  // ── SONGS LISTENER ────────────────────────────────────────────────
  db.collection("voting_songs").orderBy("order").onSnapshot(snap => {
    songs = {};
    snap.forEach(doc => { songs[doc.id] = doc.data(); });
    renderSongList();
    renderNowPlayingSelector();
    renderVotes();
  });

  // ── VOTES LISTENER ────────────────────────────────────────────────
  db.collection("voting_votes").onSnapshot(snap => {
    allVotes = {};
    snap.forEach(doc => { allVotes[doc.id] = doc.data(); });
    const count = Object.keys(allVotes).length;
    document.getElementById("voter-count").textContent =
      `${count} Schüler ${count===1?'hat':'haben'} abgestimmt`;
    renderVotes();
  });

  // ── PHASE ─────────────────────────────────────────────────────────
  function setPhase(phase) {
    db.collection("voting_session").doc("state").set({ phase, currentSong: currentSongId || null }, { merge: true });
  }

  // ── SONGS ─────────────────────────────────────────────────────────
  function addSong() {
    const title = document.getElementById("input-title").value.trim();
    const artist = document.getElementById("input-artist").value.trim();
    if (!title) return;
    const order = Object.keys(songs).length + 1;
    db.collection("voting_songs").add({ title, artist, order });
    document.getElementById("input-title").value = "";
    document.getElementById("input-artist").value = "";
    document.getElementById("input-title").focus();
  }

  function deleteSong(id) {
    if (!confirm("Song löschen?")) return;
    db.collection("voting_songs").doc(id).delete();
    if (currentSongId === id)
      db.collection("voting_session").doc("state").set({ currentSong: null }, { merge: true });
  }

  function setCurrentSong(id) {
    currentSongId = id;
    db.collection("voting_session").doc("state").set({ currentSong: id }, { merge: true });
  }

  document.getElementById("input-title").addEventListener("keydown", e => { if (e.key==="Enter") addSong(); });

  // ── RENDER SONGS ──────────────────────────────────────────────────
  function renderSongList() {
    const list = document.getElementById("song-list");
    const arr = Object.entries(songs);
    if (!arr.length) { list.innerHTML = '<div class="empty">Noch keine Songs</div>'; return; }
    list.innerHTML = arr.map(([id,s]) => `
      <div class="song-item ${id===currentSongId?'now-playing':''}">
        ${id===currentSongId?'<div class="playing-dot"></div>':'<div class="spacer-dot"></div>'}
        <div class="song-info">
          <div class="song-name">${s.title}</div>
          ${s.artist?`<div class="song-artist">${s.artist}</div>`:''}
        </div>
        <button class="btn btn-red btn-sm" onclick="deleteSong('${id}')">✕</button>
      </div>`).join('');
  }

  function renderNowPlayingSelector() {
    const sel = document.getElementById("now-playing-selector");
    const arr = Object.entries(songs);
    if (!arr.length) { sel.innerHTML = '<div class="empty">Keine Songs vorhanden</div>'; return; }
    sel.innerHTML = arr.map(([id,s]) => `
      <div class="song-item ${id===currentSongId?'now-playing':''}" style="cursor:pointer" onclick="setCurrentSong('${id}')">
        ${id===currentSongId?'<div class="playing-dot"></div>':'<div class="spacer-dot"></div>'}
        <div class="song-info">
          <div class="song-name">${s.title}</div>
          ${s.artist?`<div class="song-artist">${s.artist}</div>`:''}
        </div>
        <span style="font-size:12px;color:var(--muted)">${id===currentSongId?'▶ aktiv':'wählen'}</span>
      </div>`).join('');
  }

  // ── RENDER VOTES ──────────────────────────────────────────────────
  function renderVotes() {
    const grid = document.getElementById("votes-grid");
    const arr = Object.entries(songs);
    if (!arr.length) { grid.innerHTML = '<div class="empty">Keine Songs</div>'; return; }

    const totals = arr.map(([id,s]) => {
      let total = 0;
      Object.values(allVotes).forEach(v => { total += (v[id]||0); });
      return { id, title:s.title, total };
    }).sort((a,b) => b.total-a.total);

    const max = totals[0]?.total || 1;
    grid.innerHTML = totals.map((s,i) => `
      <div class="vote-row ${i===0&&s.total>0?'leader':''}">
        <div class="vote-song">${s.title}</div>
        <div class="vote-bar-wrap"><div class="vote-bar" style="width:${Math.round(s.total/max*100)}%"></div></div>
        <div class="vote-total">${s.total}</div>
      </div>`).join('');
  }

  // ── DANGER ────────────────────────────────────────────────────────
  async function clearVotes() {
    if (!confirm("Alle Stimmen unwiderruflich löschen?")) return;
    const snap = await db.collection("voting_votes").get();
    snap.forEach(doc => doc.ref.delete());
  }

  async function clearAll() {
    if (!confirm("ALLES löschen (Songs + Stimmen + Phase)?")) return;
    const songs = await db.collection("voting_songs").get();
    songs.forEach(doc => doc.ref.delete());
    const votes = await db.collection("voting_votes").get();
    votes.forEach(doc => doc.ref.delete());
    db.collection("voting_session").doc("state").set({ phase:"waiting", currentSong:null });
  }
</script>
</body>
</html>
