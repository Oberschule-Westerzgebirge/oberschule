<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umfrage</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2e;
    --blue: #1a4a8a;
    --blue-mid: #2563b0;
    --blue-light: #3b82e8;
    --silver: #c8d4e8;
    --white: #f4f7fb;
    --accent: #e8a020;
    --success: #2d8f5e;
    --error: #c0392b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: var(--navy);
    font-family: 'Source Sans 3', sans-serif;
    color: var(--white);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(26,74,138,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(59,130,232,0.15) 0%, transparent 50%);
  }
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(200,212,232,0.15);
    background: rgba(13,27,46,0.85);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 50;
  }
  header img { height: 60px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700;
    letter-spacing: 0.03em; line-height: 1.2;
  }
  .header-text p {
    font-size: 0.75rem; color: var(--silver);
    letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px;
  }
  .header-badge {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,212,232,0.2);
    border-radius: 20px; padding: 6px 14px;
    font-size: 0.8rem; color: var(--silver);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
  }
  .status-dot.closed { background: var(--error); box-shadow: 0 0 6px var(--error); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  main { display: flex; justify-content: center; padding: 48px 20px 60px; }

  .card {
    width: 100%; max-width: 560px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,212,232,0.15);
    border-radius: 16px; padding: 40px;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; margin-bottom: 6px;
  }
  .card-subtitle {
    color: var(--silver); font-size: 0.88rem;
    margin-bottom: 32px; line-height: 1.5;
  }
  .notice {
    border-radius: 10px; padding: 16px 20px;
    margin-bottom: 24px; font-size: 0.9rem;
    line-height: 1.5; display: flex; gap: 12px; align-items: flex-start;
  }
  .notice-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
  .notice.info    { background: rgba(59,130,232,0.12);  border: 1px solid rgba(59,130,232,0.3);  color: #a8c8f8; }
  .notice.warn    { background: rgba(232,160,32,0.12);  border: 1px solid rgba(232,160,32,0.3);  color: #f4cc80; }
  .notice.error-box { background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.3);  color: #f4a0a0; }
  .notice.success { background: rgba(45,143,94,0.15);   border: 1px solid rgba(45,143,94,0.35); color: #80d4a8; }

  .section-divider {
    border: none; border-top: 1px solid rgba(200,212,232,0.1);
    margin: 28px 0;
  }
  .section-label {
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(200,212,232,0.5); margin-bottom: 16px;
  }

  /* ── Felder ── */
  .field { margin-bottom: 18px; }
  label.field-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--silver); margin-bottom: 8px;
  }
  .badge-pflicht  { font-size: 0.65rem; background: var(--error);           color: #fff; padding: 2px 7px; border-radius: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .badge-optional { font-size: 0.65rem; background: rgba(255,255,255,0.12); color: var(--silver); padding: 2px 7px; border-radius: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

  select, input[type="text"], input[type="email"] {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(200,212,232,0.2);
    border-radius: 8px; color: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem; outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  input[type="text"]::placeholder,
  input[type="email"]::placeholder { color: rgba(200,212,232,0.4); }
  select { appearance: none; -webkit-appearance: none; cursor: pointer; }
  select:focus, input[type="text"]:focus, input[type="email"]:focus {
    border-color: var(--blue-light); background: rgba(255,255,255,0.09);
  }
  select:disabled { opacity: 0.45; cursor: not-allowed; }
  select option { background: #1a2840; color: var(--white); }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾'; position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); color: var(--silver);
    pointer-events: none; font-size: 0.9rem;
  }

  /* ── JaNein Fragen ── */
  .frage-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .frage-text {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 10px;
    margin-bottom: 12px;
  }
  .frage-text span {
    font-size: 0.92rem; color: var(--silver); line-height: 1.45; flex: 1;
  }
  .janein-row { display: flex; gap: 8px; }
  .janein-btn {
    flex: 1; padding: 9px 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07); color: var(--silver);
    cursor: pointer; font-family: inherit; font-size: 0.9rem;
    transition: all 0.15s;
  }
  .janein-btn:hover { background: rgba(255,255,255,0.12); }

  /* ── Submit ── */
  .btn-submit {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    border: none; border-radius: 8px; color: #fff;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1rem; font-weight: 600;
    letter-spacing: 0.05em; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 8px;
  }
  .btn-submit:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  #loading-overlay {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 48px 0;
  }
  .big-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(200,212,232,0.2);
    border-top-color: var(--blue-light);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    text-align: center; padding: 20px;
    font-size: 0.75rem; color: rgba(200,212,232,0.35);
    letter-spacing: 0.06em;
  }
  @media (max-width: 600px) {
    header { padding: 16px 20px; flex-wrap: wrap; }
    .header-badge { display: none; }
    .card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<header>
  <img id="school-logo" src="" alt="Schule">
  <div class="header-text">
    <h1 id="header-title">Umfrage</h1>
    <p id="header-subtitle">Umfrage-Portal</p>
  </div>
  <div class="header-badge">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Wird geladen…</span>
  </div>
</header>

<main>
  <div class="card">

    <!-- LOADING -->
    <div id="loading-overlay">
      <div class="big-spinner"></div>
      <p style="color:var(--silver);font-size:0.9rem;">Einstellungen werden geladen…</p>
    </div>

    <!-- GESCHLOSSEN -->
    <div class="notice error-box" id="closed-notice" style="display:none">
      <span class="notice-icon">🔒</span>
      <div>
        <strong>Umfrage geschlossen</strong><br>
        <span id="closed-reason"></span>
        <span id="closed-zeitraum" style="display:none; margin-top:6px; display:block; font-size:0.85rem; opacity:0.85;"></span>
      </div>
    </div>

    <!-- FORMULAR -->
    <div id="umfrage-form" style="display:none">
      <p class="card-title" id="card-title">Umfrage</p>
      <p class="card-subtitle" id="card-subtitle">Bitte alle Pflichtfelder ausfüllen.</p>

      <div class="notice info" id="open-info" style="display:none">
        <span class="notice-icon">📅</span>
        <div id="open-info-text"></div>
      </div>

      <!-- ── KLASSE / NAME (optional einblenden) ── -->
      <div id="block-klasse" style="display:none">
        <p class="section-label">Klasse &amp; Name</p>
        <div class="field">
          <label class="field-label">Klasse</label>
          <div class="select-wrap">
            <select id="sel-klasse" onchange="onKlasseChange()">
              <option value="">— Klasse wählen —</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Name</label>
          <div class="select-wrap">
            <select id="sel-name" disabled onchange="checkReady()">
              <option value="">— Bitte zuerst Klasse wählen —</option>
            </select>
          </div>
        </div>
        <hr class="section-divider">
      </div>

      <!-- ── PERSON (Nachname / Vorname / E-Mail) ── -->
      <div id="block-person" style="display:none">
        <p class="section-label" id="person-label">Angaben zur Person</p>

        <div class="field" id="field-nachname" style="display:none">
          <label class="field-label" for="inp-nachname">
            Nachname <span id="badge-nachname"></span>
          </label>
          <input type="text" id="inp-nachname" placeholder="Mustermann" oninput="checkReady()">
        </div>

        <div class="field" id="field-vorname" style="display:none">
          <label class="field-label" for="inp-vorname">
            Vorname <span id="badge-vorname"></span>
          </label>
          <input type="text" id="inp-vorname" placeholder="Max" oninput="checkReady()">
        </div>

        <div class="field" id="field-email" style="display:none">
          <label class="field-label" for="inp-email">
            E-Mail <span id="badge-email"></span>
          </label>
          <input type="email" id="inp-email" placeholder="max@beispiel.de" oninput="checkReady()">
        </div>

        <hr class="section-divider">
      </div>

      <!-- ── FRAGEN ── -->
      <div id="fragen-container" style="display:none">
        <p class="section-label">Fragen</p>
      </div>

      <button class="btn-submit" id="btn-submit" onclick="doSubmit()" disabled>
        <span id="btn-label">Absenden</span>
        <div class="btn-spinner" id="btn-spinner"></div>
      </button>
    </div>

    <!-- ERFOLG -->
    <div class="notice success" id="success-notice" style="display:none">
      <span class="notice-icon">✅</span>
      <div>
        <strong>Vielen Dank!</strong><br>
        <span id="success-text">Deine Antworten wurden gespeichert.</span>
      </div>
    </div>

    <!-- FEHLER -->
    <div class="notice error-box" id="error-notice" style="display:none">
      <span class="notice-icon">⚠️</span>
      <div>
        <strong>Fehler</strong><br>
        <span id="error-text"></span>
      </div>
    </div>

  </div>
</main>

<footer id="footer-text">Umfrage-Portal</footer>

<script>
// ══════════════════════════════════════════════
// KONFIGURATION – Apps Script URL hier eintragen
// ══════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxSNQJExo44lfVGSFB0eMCM4xVSZXPMowErK7Ay2CQxaNwrA66DQFGqlgo3pJCO0c0C/exec';
// ══════════════════════════════════════════════

let schuelerData = {};
let settingsData  = {};

// ── INIT ──────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const resp = await fetch(APPS_SCRIPT_URL);
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'Unbekannter Fehler');
    schuelerData = data.schueler || {};
    settingsData = data.settings || {};
    renderPage(settingsData, schuelerData);
  } catch(e) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-notice').style.display = 'flex';
    document.getElementById('error-text').textContent = 'Einstellungen konnten nicht geladen werden: ' + e.message;
  }
});

// ── SEITE AUFBAUEN ────────────────────────────
function renderPage(settings, schueler) {
  document.getElementById('loading-overlay').style.display = 'none';

  const startStr = settings['Start-Datum'] || '';
  const endStr   = settings['End-Datum']   || '';
  const isOpen   = isUmfrageOffen(settings);

  // Status-Badge
  document.getElementById('status-dot').className = 'status-dot' + (isOpen ? '' : ' closed');
  document.getElementById('status-text').textContent = isOpen ? 'Umfrage geöffnet' : 'Umfrage geschlossen';

  // Titel im Header
  const titel = settings['Titel'] || 'Umfrage';
  document.getElementById('header-title').textContent = titel;
  document.title = titel;

  if (!isOpen) {
    const now   = new Date();
    const start = parseDateDE(startStr);
    const end   = parseDateDE(endStr);
    const offen = (settings['Umfrage offen']||'').toUpperCase() === 'JA';
    let reason = 'Die Umfrage ist derzeit nicht geöffnet.';
    if (!offen)                    reason = 'Die Umfrage ist manuell deaktiviert.';
    else if (start && now < start) reason = `Öffnet am ${formatDatum(startStr)}.`;
    else if (end   && now > end)   reason = `Abgabefrist war am ${formatDatum(endStr)}.`;
    document.getElementById('closed-reason').textContent = reason;
    if (startStr || endStr) {
      let zeitraum = '';
      if (startStr && endStr) zeitraum = `Zeitraum: ${formatDatum(startStr)} bis ${formatDatum(endStr)}`;
      else if (startStr)      zeitraum = `Ab: ${formatDatum(startStr)}`;
      else if (endStr)        zeitraum = `Bis: ${formatDatum(endStr)}`;
      const z = document.getElementById('closed-zeitraum');
      z.textContent = zeitraum; z.style.display = 'block';
    }
    document.getElementById('closed-notice').style.display = 'flex';
    return;
  }

  // Info-Banner (Zeitraum)
  if (startStr || endStr) {
    document.getElementById('open-info').style.display = 'flex';
    let txt = '';
    if (startStr && endStr) txt = `Zeitraum: ${formatDatum(startStr)} – ${formatDatum(endStr)}`;
    else if (startStr) txt = `Ab ${formatDatum(startStr)}`;
    else if (endStr)   txt = `Bis ${formatDatum(endStr)}`;
    document.getElementById('open-info-text').textContent = txt;
  }

  // Titel / Untertitel
  document.getElementById('card-title').textContent   = titel;
  document.getElementById('card-subtitle').textContent = settings['Untertitel'] || '';

  // Klasse / Name
  const mitKlasse = (settings['Mit Klasse']||'').toUpperCase() === 'JA';
  if (mitKlasse && Object.keys(schueler).length > 0) {
    document.getElementById('block-klasse').style.display = 'block';
    const selKlasse = document.getElementById('sel-klasse');
    Object.keys(schueler).sort(sortKlassen).forEach(k =>
      selKlasse.appendChild(new Option(k, k))
    );
  }

  // Personenfelder
  const nachname = normalizeTyp(settings['Nachname']);
  const vorname  = normalizeTyp(settings['Vorname']);
  const email    = normalizeTyp(settings['E-Mail']);
  let showPerson = false;
  if (nachname !== 'nein') { showField('field-nachname', 'badge-nachname', nachname); showPerson = true; }
  if (vorname  !== 'nein') { showField('field-vorname',  'badge-vorname',  vorname);  showPerson = true; }
  if (email    !== 'nein') { showField('field-email',    'badge-email',    email);     showPerson = true; }
  if (showPerson) document.getElementById('block-person').style.display = 'block';

  // Fragen
  renderFragen(settings);

  document.getElementById('umfrage-form').style.display = 'block';
  checkReady();
}

function showField(fieldId, badgeId, typ) {
  document.getElementById(fieldId).style.display = 'block';
  const badge = document.getElementById(badgeId);
  if (typ === 'pflicht') {
    badge.className = 'badge-pflicht'; badge.textContent = 'Pflicht';
  } else {
    badge.className = 'badge-optional'; badge.textContent = 'Optional';
  }
}

function normalizeTyp(val) {
  if (!val) return 'nein';
  const v = val.toString().trim().toLowerCase();
  if (v === 'pflicht')  return 'pflicht';
  if (v === 'optional') return 'optional';
  return 'nein';
}

// ── FRAGEN RENDERN ────────────────────────────
function renderFragen(settings) {
  const container = document.getElementById('fragen-container');
  let count = 0;

  for (let i = 1; i <= 20; i++) {
    const text = (settings[`Frage ${i}`] || '').toString().trim();
    if (!text) continue;
    const typ  = normalizeTyp(settings[`Frage ${i} Typ`]);
    const id   = `frage_${i}`;

    const div = document.createElement('div');
    div.className  = 'frage-item';
    div.dataset.id = id;
    div.dataset.pflicht = (typ === 'pflicht') ? 'ja' : 'nein';
    div.innerHTML = `
      <div class="frage-text">
        <span>${text}</span>
        ${typ === 'pflicht'
          ? '<span class="badge-pflicht">Pflicht</span>'
          : '<span class="badge-optional">Optional</span>'}
      </div>
      <div class="janein-row">
        <button type="button" class="janein-btn" id="${id}_ja"
          onclick="selectJaNein('${id}', 'ja')">👍 Ja</button>
        <button type="button" class="janein-btn" id="${id}_nein"
          onclick="selectJaNein('${id}', 'nein')">👎 Nein</button>
      </div>
      <input type="hidden" id="${id}_val" value="">
    `;
    container.appendChild(div);
    count++;
  }

  if (count > 0) container.style.display = 'block';
}

// ── JA / NEIN ─────────────────────────────────
function selectJaNein(id, val) {
  document.getElementById(id + '_val').value = val;
  const ja   = document.getElementById(id + '_ja');
  const nein = document.getElementById(id + '_nein');
  const resetStyle = btn => {
    btn.style.background  = 'rgba(255,255,255,0.07)';
    btn.style.color       = 'var(--silver)';
    btn.style.borderColor = 'rgba(255,255,255,0.2)';
  };
  resetStyle(ja); resetStyle(nein);
  if (val === 'ja') {
    ja.style.background   = '#2d8f5e';
    ja.style.color        = 'white';
    ja.style.borderColor  = '#2d8f5e';
  } else {
    nein.style.background = '#c0392b';
    nein.style.color      = 'white';
    nein.style.borderColor= '#c0392b';
  }
  checkReady();
}

// ── KLASSE WÄHLEN ─────────────────────────────
function onKlasseChange() {
  const klass   = document.getElementById('sel-klasse').value;
  const selName = document.getElementById('sel-name');
  selName.innerHTML = '';
  if (!klass) {
    selName.appendChild(new Option('— Bitte zuerst Klasse wählen —', ''));
    selName.disabled = true;
  } else {
    selName.appendChild(new Option('— Name wählen —', ''));
    (schuelerData[klass]||[]).forEach(n => selName.appendChild(new Option(n, n)));
    selName.disabled = false;
  }
  checkReady();
}

// ── BEREIT-CHECK ──────────────────────────────
function checkReady() {
  let ok = true;

  // Klasse + Name (wenn sichtbar)
  const blockKlasse = document.getElementById('block-klasse');
  if (blockKlasse.style.display !== 'none') {
    if (!document.getElementById('sel-klasse').value) ok = false;
    if (!document.getElementById('sel-name').value)   ok = false;
  }

  // Pflicht-Personenfelder
  ['nachname','vorname','email'].forEach(f => {
    const field = document.getElementById('field-' + f);
    if (!field || field.style.display === 'none') return;
    const badge = document.getElementById('badge-' + f);
    if (!badge || badge.className !== 'badge-pflicht') return;
    const id = f === 'email' ? 'inp-email' : (f === 'nachname' ? 'inp-nachname' : 'inp-vorname');
    if (!(document.getElementById(id).value||'').trim()) ok = false;
  });

  // Pflicht-Fragen
  document.querySelectorAll('#fragen-container .frage-item[data-pflicht="ja"]').forEach(item => {
    const id  = item.dataset.id;
    if (!document.getElementById(id + '_val').value) ok = false;
  });

  document.getElementById('btn-submit').disabled = !ok;
}

// ── ABSENDEN ──────────────────────────────────
async function doSubmit() {
  setLoading(true);
  try {
    const antworten = {};
    document.querySelectorAll('#fragen-container .frage-item').forEach(item => {
      const id   = item.dataset.id;
      const frage = item.querySelector('.frage-text span').textContent.trim();
      const val  = document.getElementById(id + '_val').value;
      antworten[frage] = val ? val.toUpperCase() : '';
    });

    const mitKlasse = document.getElementById('block-klasse').style.display !== 'none';
    const payload = {
      action:   'submit',
      klasse:   mitKlasse ? document.getElementById('sel-klasse').value : '',
      name:     mitKlasse ? document.getElementById('sel-name').value   : '',
      nachname: (document.getElementById('inp-nachname').value||'').trim(),
      vorname:  (document.getElementById('inp-vorname').value||'').trim(),
      email:    (document.getElementById('inp-email').value||'').trim(),
      antworten
    };

    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const result = await resp.json();
    if (result.error) throw new Error(result.error);

    setLoading(false);
    document.getElementById('umfrage-form').style.display = 'none';
    document.getElementById('success-notice').style.display = 'flex';

  } catch(e) {
    setLoading(false);
    document.getElementById('error-notice').style.display = 'flex';
    document.getElementById('error-text').textContent = 'Fehler beim Absenden: ' + e.message;
  }
}

// ── HELPERS ───────────────────────────────────
function setLoading(on) {
  document.getElementById('btn-label').style.display   = on ? 'none'  : 'block';
  document.getElementById('btn-spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-submit').disabled = on;
}

function parseDateDE(str) {
  if (!str) return null;
  if (str instanceof Date) return str;
  const s = str.toString();
  if (s.match(/^\d{4}-\d{2}-\d{2}T/)) { const d = new Date(s); return isNaN(d) ? null : d; }
  const dp = s.match(/(\d{2})\.(\d{2})\.(\d{4})/);
  if (!dp) return null;
  const hp = s.match(/(\d{1,2}):(\d{2})/);
  const up = s.match(/[-–]?\s*(\d{1,2})\s*Uhr/i);
  const h  = hp ? parseInt(hp[1],10) : (up ? parseInt(up[1],10) : 0);
  const m  = hp ? parseInt(hp[2],10) : 0;
  return new Date(parseInt(dp[3],10), parseInt(dp[2],10)-1, parseInt(dp[1],10), h, m, 0);
}

function formatDatum(str) {
  if (!str) return '';
  const d = parseDateDE(str.toString());
  if (!d) return str.toString();
  const tag = String(d.getDate()).padStart(2,'0');
  const mon = String(d.getMonth()+1).padStart(2,'0');
  const std = String(d.getHours()).padStart(2,'0');
  const min = String(d.getMinutes()).padStart(2,'0');
  return (d.getHours()===0&&d.getMinutes()===0)
    ? `${tag}.${mon}.${d.getFullYear()}`
    : `${tag}.${mon}.${d.getFullYear()} / ${std}:${min} Uhr`;
}

function isUmfrageOffen(settings) {
  if ((settings['Umfrage offen']||'').toUpperCase() !== 'JA') return false;
  const now   = new Date();
  const start = parseDateDE(settings['Start-Datum']||'');
  const end   = parseDateDE(settings['End-Datum']  ||'');
  if (start && now < start) return false;
  if (end   && now > end)   return false;
  return true;
}

function sortKlassen(a, b) {
  const num    = s => parseInt(s) || 0;
  const letter = s => s.replace(/\d/g,'');
  return num(a) - num(b) || letter(a).localeCompare(letter(b));
}
